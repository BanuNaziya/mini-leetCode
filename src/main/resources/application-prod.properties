# ============================================================
# Mini LeetCode - Production Configuration (Railway.app)
# ============================================================
# These values are overridden by Railway environment variables.
# Set the following in Railway dashboard:
#   DATABASE_URL  - full JDBC URL from Railway MySQL plugin
#   DATABASE_USER - MySQL username
#   DATABASE_PASSWORD - MySQL password
#   PORT          - assigned automatically by Railway

# --- Database (Railway MySQL plugin injects these) ---
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}

# --- JPA / Hibernate ---
# 'update' keeps schema in sync without destroying data
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- Server ---
server.port=${PORT:8080}

# --- Logging (less verbose in production) ---
logging.level.com.minileetcode=INFO
logging.level.org.hibernate.SQL=WARN
