# ============================================================
# Mini LeetCode - Application Configuration (Local Dev)
# ============================================================

# --- Database Configuration ---
# Railway MySQL plugin exposes: MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD
# Fallback values are for local dev (override with your local MySQL credentials)
# Railway shares these variables from the MySQL plugin to this service:
# MYSQLHOST, MYSQLPORT, MYSQLUSER, MYSQL_DATABASE, MYSQL_ROOT_PASSWORD
# Note: MYSQLDATABASE and MYSQLPASSWORD are NOT auto-shared; use the underscore versions
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQL_DATABASE:minileetcode}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQL_ROOT_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# 'update' auto-creates/updates tables based on entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Server ---
server.port=${PORT:8080}

# --- Application Info ---
spring.application.name=minileetcode

# --- Springdoc / Swagger UI ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# --- Logging ---
logging.level.com.minileetcode=DEBUG
logging.level.org.hibernate.SQL=DEBUG
